spring:
  application:
    name: e-commerce_v2
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
    hikari:
      schema: product_schema

  management:
    health:
      redis:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  redis:
    host: localhost


  sleuth:
    sampler:
      probability: 1.0

  zipkin:
    base-url: http://localhost:9411/api/v2/spans
    sender:
      type: web
    enabled: true
  data:
    redis:
      port: 6379

server:
  port: 8082
